<div class="tabla-contenedor">
  <h2>🏋️‍♂️ Inventario de Máquinas</h2>
  <form (ngSubmit)="guardarMaquina()" style="display: flex; gap: 15px; background: rgba(255,255,255,0.02); padding: 20px; border-radius: 8px; border: 1px solid var(--borde); margin-bottom: 30px; align-items: flex-end;">
    <div style="display: flex; flex-direction: column; flex: 2; gap: 5px;">
      <label style="color: var(--texto-secundario); font-size: 0.85rem;">Nombre / Modelo</label>
      <input type="text" name="nombre" [(ngModel)]="nuevaMaquina.nombre" required placeholder="Ej. Prensa de Piernas 45°" style="background: var(--bg-principal); border: 1px solid var(--borde); padding: 10px; border-radius: 6px; color: white;">
    </div>
    <div style="display: flex; flex-direction: column; flex: 1; gap: 5px;">
      <label style="color: var(--texto-secundario); font-size: 0.85rem;">Estado</label>
      <select name="estado" [(ngModel)]="nuevaMaquina.estado" style="background: var(--bg-principal); border: 1px solid var(--borde); padding: 10px; border-radius: 6px; color: white; height: 38px;">
        <option value="Operativa">Operativa</option>
        <option value="Mantenimiento">Mantenimiento</option>
        <option value="Fuera de Servicio">Fuera de Servicio</option>
      </select>
    </div>
    <div style="display: flex; flex-direction: column; flex: 1.5; gap: 5px;">
      <label style="color: var(--texto-secundario); font-size: 0.85rem;">Ubicación (Área)</label>
      <select name="area" [(ngModel)]="nuevaMaquina.area" required style="background: var(--bg-principal); border: 1px solid var(--borde); padding: 10px; border-radius: 6px; color: white; height: 38px;">
        <option value="" disabled selected>Selecciona un área...</option>
        <option *ngFor="let a of areas" [value]="a.id">{{ a.nombre }}</option>
      </select>
    </div>
    <button type="submit" class="btn btn-primary">{{ editando ? '💾 Actualizar' : '➕ Agregar' }}</button>
  </form>
  <table>
    <thead><tr><th>ID</th><th>Máquina</th><th>Estado</th><th>Área Asignada</th><th style="text-align: right;">Acciones</th></tr></thead>
    <tbody>
      <tr *ngFor="let mq of maquinas">
        <td>#{{ mq.id }}</td>
        <td style="font-weight: 600; color: var(--acento);">{{ mq.nombre }}</td>
        <td>
          <span [style.color]="mq.estado === 'Operativa' ? '#00e676' : '#ff3b30'">● {{ mq.estado }}</span>
        </td>
        <td>ID Área: {{ mq.area }}</td>
        <td style="text-align: right; display: flex; gap: 10px; justify-content: flex-end;">
          <button class="btn" style="background: #3a3a4c; color: white; padding: 6px 12px;" (click)="cargarParaEditar(mq)">✏️ Editar</button>
          <button class="btn btn-danger" style="padding: 6px 12px;" (click)="eliminarMaquina(mq.id)">🗑️</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
