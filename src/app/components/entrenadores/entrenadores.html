<div class="tabla-contenedor">
  <h2>🎽 Equipo de Entrenadores</h2>
  <form (ngSubmit)="guardarEntrenador()" style="display: flex; gap: 15px; background: rgba(255,255,255,0.02); padding: 20px; border-radius: 8px; border: 1px solid var(--borde); margin-bottom: 30px; align-items: flex-end;">
    <div style="display: flex; flex-direction: column; flex: 2; gap: 5px;">
      <label style="color: var(--texto-secundario); font-size: 0.85rem;">Nombre Completo</label>
      <input type="text" name="nombre" [(ngModel)]="nuevoEntrenador.nombre" required placeholder="Ej. Coach Aaron" style="background: var(--bg-principal); border: 1px solid var(--borde); padding: 10px; border-radius: 6px; color: white;">
    </div>
    <div style="display: flex; flex-direction: column; flex: 1.5; gap: 5px;">
      <label style="color: var(--texto-secundario); font-size: 0.85rem;">Especialidad</label>
      <input type="text" name="especialidad" [(ngModel)]="nuevoEntrenador.especialidad" required placeholder="Ej. Hipertrofia / Powerlifting" style="background: var(--bg-principal); border: 1px solid var(--borde); padding: 10px; border-radius: 6px; color: white;">
    </div>
    <div style="display: flex; flex-direction: column; flex: 1; gap: 5px;">
      <label style="color: var(--texto-secundario); font-size: 0.85rem;">Turno</label>
      <select name="turno" [(ngModel)]="nuevoEntrenador.turno" style="background: var(--bg-principal); border: 1px solid var(--borde); padding: 10px; border-radius: 6px; color: white; height: 38px;">
        <option value="Matutino">Matutino</option>
        <option value="Vespertino">Vespertino</option>
        <option value="Mixto">Mixto</option>
      </select>
    </div>
    <button type="submit" class="btn btn-primary">{{ editando ? '💾 Guardar' : '➕ Registrar' }}</button>
  </form>
  <table>
    <thead><tr><th>ID</th><th>Nombre</th><th>Especialidad</th><th>Turno</th><th style="text-align: right;">Acciones</th></tr></thead>
    <tbody>
      <tr *ngFor="let e of entrenadores">
        <td>#{{ e.id }}</td>
        <td style="font-weight: 600; color: var(--acento);">{{ e.nombre }}</td>
        <td>{{ e.especialidad }}</td>
        <td><span style="background: #2c2c35; padding: 4px 8px; border-radius: 4px;">{{ e.turno }}</span></td>
        <td style="text-align: right; display: flex; gap: 10px; justify-content: flex-end;">
          <button class="btn" style="background: #3a3a4c; color: white; padding: 6px 12px;" (click)="cargarParaEditar(e)">✏️ Editar</button>
          <button class="btn btn-danger" style="padding: 6px 12px;" (click)="eliminarEntrenador(e.id)">🗑️</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
